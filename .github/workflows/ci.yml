name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install GNOME extension tooling
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes gnome-shell

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check
