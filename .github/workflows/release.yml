name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version or tag, for example 1.0.0 or v1.0.0"
        required: true
        type: string
      prerelease:
        description: "Mark this GitHub Release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Pack and publish release
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install GNOME extension tooling
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes gnome-shell

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Pack extension
        run: npm run pack

      - name: Resolve release tag
        id: release
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${INPUT_VERSION}"
            case "${tag}" in
              v*) ;;
              *) tag="v${tag}" ;;
            esac
          fi

          if ! printf '%s' "${tag}" | grep -Eq '^v[0-9][0-9A-Za-z.-]*$'; then
            echo "Invalid release tag: ${tag}" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "asset=dist/airgradient@worxbend.dev.shell-extension.zip" >> "${GITHUB_OUTPUT}"

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            echo "Tag ${RELEASE_TAG} already exists locally"
          elif git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}"; then
            git fetch origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          else
            git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
            git push origin "${RELEASE_TAG}"
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_ASSET: ${{ steps.release.outputs.asset }}
          PRERELEASE: ${{ inputs.prerelease || false }}
        run: |
          args=(
            "${RELEASE_TAG}"
            "${RELEASE_ASSET}"
            --title "${RELEASE_TAG}"
            --notes "Packaged GNOME Shell extension for ${RELEASE_TAG}."
          )

          if [ "${PRERELEASE}" = "true" ]; then
            args+=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${RELEASE_ASSET}" --clobber
          else
            gh release create "${args[@]}"
          fi
